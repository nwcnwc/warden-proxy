<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Website Access &mdash; Warden Admin</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #ffaa00;
    --accent-dim: rgba(255, 170, 0, 0.1);
    --accent-border: rgba(255, 170, 0, 0.25);
    --danger: #ff4444;
    --success: #00ff88;
    --warn: #ffaa00;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .admin-banner {
    background: var(--accent-dim);
    border-bottom: 1px solid var(--accent-border);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .admin-banner svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-link {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
  }
  .back-link:hover { color: var(--accent); }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .admin-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent-border); color: var(--text); }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* Quick Login */
  .quick-login {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .quick-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover { border-color: var(--accent-border); background: var(--surface-hover); }
  .quick-btn .icon { font-size: 18px; }

  /* Add Domain */
  .add-domain {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  .add-domain input {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 14px;
  }
  .add-domain input:focus { outline: none; border-color: var(--accent); }
  .add-domain input::placeholder { color: #555; }

  .login-btn {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-weight: 600;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .login-btn:hover { opacity: 0.85; }

  /* Sessions Table */
  .section { margin-bottom: 32px; }

  .section h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .session-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
  }
  .session-card:hover { border-color: var(--accent-border); }

  .session-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .session-info { flex: 1; min-width: 0; }

  .session-domain {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--success); }
  .status-dot.expired { background: var(--danger); }
  .status-dot.capturing { background: var(--warn); animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .session-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    margin-top: 4px;
  }

  .session-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--accent-border); color: var(--text); }
  .action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }
  .empty-state p { margin-bottom: 8px; }

  @media (max-width: 640px) {
    .quick-login { gap: 8px; }
    .quick-btn { padding: 6px 12px; font-size: 12px; }
    .add-domain { flex-direction: column; }
    .session-card { flex-wrap: wrap; }
    .session-actions { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<div class="admin-banner">
  <svg viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
  <span>Warden Admin Panel</span>
</div>

<div class="header">
  <div class="header-left">
    <a class="back-link" href="/">&larr; Launchpad</a>
    <h1>Website Access <span class="admin-tag">Admin</span></h1>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadSessions()">Refresh</button>
  </div>
</div>

<div class="container">

  <div class="quick-login">
    <button class="quick-btn" onclick="startCapture('google.com','https://accounts.google.com')"><span class="icon">&#x1F310;</span> Google</button>
    <button class="quick-btn" onclick="startCapture('yahoo.com','https://login.yahoo.com')"><span class="icon">&#x1F4E8;</span> Yahoo</button>
    <button class="quick-btn" onclick="startCapture('microsoft.com','https://login.microsoftonline.com')"><span class="icon">&#x1F4BB;</span> Microsoft</button>
    <button class="quick-btn" onclick="startCapture('github.com','https://github.com/login')"><span class="icon">&#x1F431;</span> GitHub</button>
  </div>

  <div class="add-domain">
    <input type="text" id="domain-input" placeholder="Enter any domain (e.g., yahoo.com)">
    <button class="login-btn" onclick="startCaptureFromInput()">Login &rarr;</button>
  </div>

  <div class="section">
    <h2>Active Sessions</h2>
    <div class="session-list" id="session-list">
      <div class="empty-state">
        <p>No sessions captured yet.</p>
        <p>Click a quick login button or enter a domain above.</p>
      </div>
    </div>
  </div>

</div>

<script>
(function() {

  async function loadSessions() {
    try {
      var resp = await fetch('/admin/api/sessions');
      var sessions = await resp.json();
      renderSessions(sessions);
    } catch(e) {
      document.getElementById('session-list').innerHTML =
        '<div class="empty-state"><p>Failed to load sessions.</p></div>';
    }
  }

  function renderSessions(sessions) {
    var list = document.getElementById('session-list');

    if (!sessions || sessions.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>No sessions captured yet.</p><p>Click a quick login button or enter a domain above.</p></div>';
      return;
    }

    list.innerHTML = '';
    sessions.forEach(function(s) {
      var card = document.createElement('div');
      card.className = 'session-card';

      var statusClass = s.status || 'active';
      var statusLabel = statusClass.charAt(0).toUpperCase() + statusClass.slice(1);
      var capturedDate = s.captured_at ? s.captured_at.split('T')[0] : '-';
      var lastUsed = s.last_used ? s.last_used.split('T')[0] : '-';

      card.innerHTML =
        '<div class="session-icon">&#x1F310;</div>' +
        '<div class="session-info">' +
          '<div class="session-domain">' +
            '<span class="status-dot ' + escapeHtml(statusClass) + '"></span>' +
            escapeHtml(s.domain) +
          '</div>' +
          '<div class="session-meta">' +
            '<span>Captured: ' + escapeHtml(capturedDate) + '</span>' +
            '<span>Last used: ' + escapeHtml(lastUsed) + '</span>' +
            '<span>Cookies: ' + (s.cookie_count || 0) + '</span>' +
            '<span>Storage: ' + (s.storage_keys || 0) + ' keys</span>' +
          '</div>' +
        '</div>' +
        '<div class="session-actions">' +
          '<button class="action-btn" onclick="refreshSession(\'' + escapeHtml(s.domain) + '\')">Refresh</button>' +
          '<button class="action-btn danger" onclick="revokeSession(\'' + escapeHtml(s.domain) + '\')">Revoke</button>' +
          '<button class="action-btn" onclick="startCapture(\'' + escapeHtml(s.domain) + '\')">Re-login</button>' +
        '</div>';
      list.appendChild(card);
    });
  }

  window.startCapture = async function(domain, startUrl) {
    try {
      var body = { domain: domain };
      if (startUrl) body.start_url = startUrl;
      var resp = await fetch('/admin/api/sessions/capture', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var result = await resp.json();
      if (result.note) {
        alert('Session file created for: ' + domain + '\n\n' + result.note);
      }
      loadSessions();
    } catch(e) {
      alert('Failed to start capture: ' + e.message);
    }
  };

  window.startCaptureFromInput = function() {
    var input = document.getElementById('domain-input');
    var domain = input.value.trim();
    if (!domain) { alert('Please enter a domain.'); return; }
    domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
    startCapture(domain);
    input.value = '';
  };

  window.refreshSession = async function(domain) {
    try {
      await fetch('/admin/api/sessions/' + encodeURIComponent(domain) + '/refresh', { method: 'POST' });
      loadSessions();
    } catch(e) {
      alert('Refresh failed: ' + e.message);
    }
  };

  window.revokeSession = async function(domain) {
    if (!confirm('Revoke session for ' + domain + '? This removes all stored auth state.')) return;
    try {
      await fetch('/admin/api/sessions/' + encodeURIComponent(domain) + '/revoke', { method: 'POST' });
      loadSessions();
    } catch(e) {
      alert('Revoke failed: ' + e.message);
    }
  };

  // Enter key in domain input
  document.getElementById('domain-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') startCaptureFromInput();
  });

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  window.loadSessions = loadSessions;
  loadSessions();
})();
</script>
</body>
</html>
