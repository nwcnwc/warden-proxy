<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>AI Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #00ff88;
    --accent-dim: rgba(0, 255, 136, 0.1);
    --accent-border: rgba(0, 255, 136, 0.2);
    --user-bg: #1e293b;
    --radius: 12px;
    --sidebar-w: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 8px;
    z-index: 20;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .back-link { color: var(--text-muted); text-decoration: none; font-size: 14px; }
  .back-link:hover { color: var(--accent); }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  select, button { font-family: inherit; font-size: 13px; }

  .hdr-select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; cursor: pointer;
  }
  .hdr-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; transition: all 0.2s; line-height: 1;
  }
  .hdr-btn:hover { border-color: var(--accent-border); color: var(--text); }

  /* Layout */
  .app-body { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0;
  }
  .sidebar-top {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; gap: 6px;
  }
  .new-chat-btn {
    flex: 1; background: var(--accent); color: #0a0a0a; border: none;
    border-radius: 6px; padding: 7px; font-weight: 600; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .new-chat-btn:hover { opacity: 0.85; }
  .export-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 6px; padding: 7px 10px; cursor: pointer; font-size: 13px;
  }
  .export-btn:hover { border-color: var(--accent-border); color: var(--text); }

  .conv-list { flex: 1; overflow-y: auto; padding: 6px; }
  .conv-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.15s; margin-bottom: 2px; color: var(--text-muted);
  }
  .conv-item:hover { background: var(--surface-hover); }
  .conv-item.active { background: var(--accent-dim); color: var(--text); border: 1px solid var(--accent-border); }
  .conv-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .conv-delete {
    opacity: 0; background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; padding: 0 4px; flex-shrink: 0;
  }
  .conv-item:hover .conv-delete { opacity: 1; }
  .conv-delete:hover { color: #ff4444; }

  /* System Prompt */
  .system-prompt-bar {
    border-bottom: 1px solid var(--border); background: var(--surface);
    flex-shrink: 0;
  }
  .system-prompt-toggle {
    display: flex; align-items: center; gap: 6px; padding: 6px 16px;
    cursor: pointer; font-size: 12px; color: var(--text-muted);
    background: none; border: none; width: 100%; text-align: left; font-family: inherit;
  }
  .system-prompt-toggle:hover { color: var(--text); }
  .system-prompt-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .system-prompt-toggle.open .arrow { transform: rotate(90deg); }
  .system-prompt-body { display: none; padding: 0 16px 10px; }
  .system-prompt-body.open { display: block; }
  .system-prompt-body textarea {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-family: inherit; font-size: 13px;
    resize: vertical; min-height: 60px; max-height: 160px;
  }
  .system-prompt-body textarea:focus { outline: none; border-color: var(--accent); }

  /* Chat Area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .message { max-width: 780px; width: 100%; margin: 0 auto; line-height: 1.6; }
  .message-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .message-role {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted);
  }
  .message-role.user { color: #60a5fa; }
  .message-role.assistant { color: var(--accent); }
  .copy-btn {
    background: none; border: 1px solid transparent; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 2px 8px; border-radius: 4px;
    opacity: 0; transition: all 0.15s;
  }
  .message:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { border-color: var(--border); color: var(--text); }
  .copy-btn.copied { color: var(--accent); }

  .message-content {
    font-size: 14px; line-height: 1.7; padding: 12px 16px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .message.user .message-content { background: var(--user-bg); border-color: rgba(96,165,250,0.2); }
  .message-content p { margin-bottom: 8px; }
  .message-content p:last-child { margin-bottom: 0; }

  /* Code blocks with highlight.js */
  .message-content pre {
    background: #0d1117; border: 1px solid var(--border); border-radius: 6px;
    margin: 8px 0; overflow-x: auto; position: relative;
  }
  .message-content pre code {
    display: block; padding: 12px; font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 12px; background: rgba(255,255,255,0.04);
    border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-muted);
  }
  .code-copy-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 11px; padding: 2px 6px; border-radius: 3px;
  }
  .code-copy-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .code-copy-btn.copied { color: var(--accent); }

  .message-content code {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px;
  }
  .message-content :not(pre) > code {
    background: rgba(255,255,255,0.06); padding: 2px 5px; border-radius: 3px;
  }
  .message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
  .message-content li { margin-bottom: 4px; }
  .message-content h1, .message-content h2, .message-content h3 { margin: 12px 0 6px; }
  .message-content strong { color: #fff; }

  .streaming-cursor {
    display: inline-block; width: 8px; height: 16px; background: var(--accent);
    margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .welcome {
    text-align: center; color: var(--text-muted); margin: auto; padding: 40px;
  }
  .welcome h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .error-msg {
    background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3);
    color: #ff6b6b; padding: 10px 14px; border-radius: 8px; font-size: 13px;
    max-width: 780px; margin: 0 auto; width: 100%;
  }

  /* Input */
  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .input-row { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; }
  .input-row textarea {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-family: inherit; font-size: 14px;
    resize: none; min-height: 44px; max-height: 200px; line-height: 1.5;
  }
  .input-row textarea:focus { outline: none; border-color: var(--accent); }
  .send-btn {
    background: var(--accent); color: #0a0a0a; border: none; border-radius: 8px;
    padding: 10px 20px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    align-self: flex-end;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn:not(:disabled):hover { opacity: 0.85; }

  /* Settings Modal */
  .settings-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .settings-overlay.open { display: flex; }
  .settings-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .settings-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border);
  }
  .settings-header h2 { font-size: 16px; font-weight: 600; }
  .settings-close {
    background: none; border: none; color: var(--text-muted); font-size: 20px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px; line-height: 1;
  }
  .settings-close:hover { color: var(--text); background: var(--surface-hover); }
  .settings-body { padding: 24px; }
  .settings-intro { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
  .key-section { margin-bottom: 16px; }
  .key-section:last-child { margin-bottom: 0; }
  .key-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .key-status { font-size: 11px; font-weight: 400; padding: 2px 6px; border-radius: 3px; }
  .key-status.set { background: rgba(0,255,136,0.15); color: var(--accent); }
  .key-status.unset { background: rgba(255,170,0,0.15); color: #ffaa00; }
  .key-input-row { display: flex; gap: 6px; }
  .key-input {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
  }
  .key-input:focus { outline: none; border-color: var(--accent); }
  .key-input::placeholder { color: var(--text-muted); opacity: 0.5; }
  .key-toggle {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 6px; padding: 8px 10px; cursor: pointer; font-size: 13px; min-width: 38px;
  }
  .key-toggle:hover { color: var(--text); border-color: var(--accent-border); }

  /* Slider settings */
  .slider-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .slider-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .slider-group { margin-bottom: 12px; }
  .slider-label {
    display: flex; justify-content: space-between; font-size: 12px;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .slider-val { color: var(--accent); font-weight: 600; }
  input[type="range"] {
    width: 100%; accent-color: var(--accent); background: transparent; height: 4px;
  }

  .settings-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px;
  }
  .settings-save-btn {
    background: var(--accent); color: #0a0a0a; border: none; border-radius: 6px;
    padding: 8px 20px; font-weight: 600; font-family: inherit; font-size: 13px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .settings-save-btn:hover { opacity: 0.85; }
  .settings-cancel-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 6px; padding: 8px 16px; font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .settings-cancel-btn:hover { color: var(--text); border-color: var(--accent-border); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .header { flex-wrap: wrap; }
    .messages { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back-link" href="/">&larr; Launchpad</a>
    <h1>AI Chat</h1>
  </div>
  <div class="header-right">
    <select class="hdr-select" id="provider"><option value="">Loading...</option></select>
    <select class="hdr-select" id="model"><option value="">Select model</option></select>
    <button class="hdr-btn" onclick="toggleSettings()" title="Settings">&#9881;</button>
  </div>
</div>

<div class="settings-overlay" id="settings-overlay">
  <div class="settings-modal">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" onclick="toggleSettings()">&times;</button>
    </div>
    <div class="settings-body">
      <p class="settings-intro">API keys are stored locally in your browser.</p>
      <div class="key-section">
        <div class="key-label">OpenAI <span class="key-status unset" id="status-openai">not set</span></div>
        <div class="key-input-row">
          <input class="key-input" type="password" id="key-openai" placeholder="sk-...">
          <button class="key-toggle" onclick="toggleKeyVis('openai')">&#128065;</button>
        </div>
      </div>
      <div class="key-section">
        <div class="key-label">Anthropic <span class="key-status unset" id="status-anthropic">not set</span></div>
        <div class="key-input-row">
          <input class="key-input" type="password" id="key-anthropic" placeholder="sk-ant-...">
          <button class="key-toggle" onclick="toggleKeyVis('anthropic')">&#128065;</button>
        </div>
      </div>
      <div class="key-section">
        <div class="key-label">Google <span class="key-status unset" id="status-google">not set</span></div>
        <div class="key-input-row">
          <input class="key-input" type="password" id="key-google" placeholder="AIza...">
          <button class="key-toggle" onclick="toggleKeyVis('google')">&#128065;</button>
        </div>
      </div>
      <div class="slider-section">
        <h3>Model Parameters</h3>
        <div class="slider-group">
          <div class="slider-label"><span>Temperature</span><span class="slider-val" id="temp-val">0.7</span></div>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
        </div>
        <div class="slider-group">
          <div class="slider-label"><span>Max Tokens</span><span class="slider-val" id="maxtok-val">4096</span></div>
          <input type="range" id="max-tokens" min="256" max="16384" step="256" value="4096">
        </div>
      </div>
    </div>
    <div class="settings-footer">
      <button class="settings-cancel-btn" onclick="toggleSettings()">Cancel</button>
      <button class="settings-save-btn" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" onclick="newConversation()">+ New Chat</button>
      <button class="export-btn" onclick="exportMarkdown()" title="Export as Markdown">&#x1F4BE;</button>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <div class="chat-area">
    <div class="system-prompt-bar">
      <button class="system-prompt-toggle" id="sp-toggle" onclick="toggleSystemPrompt()">
        <span class="arrow">&#9654;</span> System Prompt
      </button>
      <div class="system-prompt-body" id="sp-body">
        <textarea id="system-prompt" placeholder="You are a helpful assistant..."></textarea>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <h2>AI Chat</h2>
        <p>Select a provider and model, then start chatting.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script src="/client/warden-loader.js"></script>
<script>
(function() {
  const PROXY = '/proxy';
  const STORAGE_KEY = 'ai-chat-conversations';
  const SETTINGS_KEY = 'ai-chat-settings';
  const API_KEYS_STORAGE = 'ai-chat-api-keys';

  let conversations = [];
  let activeConvId = null;
  let streaming = false;
  let availableServices = [];

  // ── Settings ──
  const KEY_HEADERS = {
    openai: { header: 'Authorization', prefix: 'Bearer ' },
    anthropic: { header: 'x-api-key', prefix: '' },
    google: { header: 'x-goog-api-key', prefix: '' }
  };

  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch(e) { return {}; }
  }
  function saveSettingsToStorage(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
  function loadApiKeys() {
    try { return JSON.parse(localStorage.getItem(API_KEYS_STORAGE) || '{}'); } catch(e) { return {}; }
  }
  function saveApiKeysToStorage(k) { localStorage.setItem(API_KEYS_STORAGE, JSON.stringify(k)); }

  // ── Conversations persistence ──
  function loadConversations() {
    try { conversations = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { conversations = []; }
    if (!conversations.length) newConversation();
    else {
      activeConvId = conversations[0].id;
      renderConvList();
      renderMessages();
    }
  }
  function saveConversations() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
  }
  function getActiveConv() { return conversations.find(function(c) { return c.id === activeConvId; }); }

  window.newConversation = function() {
    var conv = { id: Date.now().toString(), title: 'New Chat', messages: [], systemPrompt: '' };
    conversations.unshift(conv);
    activeConvId = conv.id;
    saveConversations();
    renderConvList();
    renderMessages();
    document.getElementById('system-prompt').value = '';
  };

  function switchConversation(id) {
    activeConvId = id;
    var conv = getActiveConv();
    renderConvList();
    renderMessages();
    document.getElementById('system-prompt').value = conv ? conv.systemPrompt || '' : '';
  }

  function deleteConversation(id) {
    conversations = conversations.filter(function(c) { return c.id !== id; });
    if (activeConvId === id) {
      if (conversations.length) { activeConvId = conversations[0].id; }
      else { newConversation(); return; }
    }
    saveConversations();
    renderConvList();
    renderMessages();
  }

  function renderConvList() {
    var list = document.getElementById('conv-list');
    list.innerHTML = '';
    conversations.forEach(function(conv) {
      var div = document.createElement('div');
      div.className = 'conv-item' + (conv.id === activeConvId ? ' active' : '');
      div.innerHTML = '<span class="conv-title">' + escapeHtml(conv.title) + '</span>' +
        '<button class="conv-delete" title="Delete">&times;</button>';
      div.querySelector('.conv-title').addEventListener('click', function() { switchConversation(conv.id); });
      div.querySelector('.conv-delete').addEventListener('click', function(e) {
        e.stopPropagation(); deleteConversation(conv.id);
      });
      list.appendChild(div);
    });
  }

  // ── Providers ──
  const PROVIDERS = {
    openai: {
      name: 'OpenAI',
      models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'],
      chatPath: '/v1/chat/completions',
      buildRequest: function(model, msgs, settings) {
        return { model: model, messages: msgs, stream: true, temperature: settings.temperature, max_tokens: settings.maxTokens };
      },
      parseSSE: function(line) {
        if (line === '[DONE]') return { done: true };
        try {
          var j = JSON.parse(line);
          var d = j.choices && j.choices[0] && j.choices[0].delta;
          if (d && d.content) return { content: d.content };
          if (j.choices && j.choices[0] && j.choices[0].finish_reason) return { done: true };
        } catch(e) {}
        return {};
      }
    },
    anthropic: {
      name: 'Anthropic',
      models: ['claude-sonnet-4-6-20250514', 'claude-haiku-4-5-20251001', 'claude-3-5-sonnet-20241022'],
      chatPath: '/v1/messages',
      extraHeaders: { 'anthropic-version': '2023-06-01' },
      buildRequest: function(model, msgs, settings) {
        var system; var filtered = [];
        msgs.forEach(function(m) { if (m.role === 'system') system = m.content; else filtered.push(m); });
        return { model: model, max_tokens: settings.maxTokens, stream: true, system: system, messages: filtered, temperature: settings.temperature };
      },
      parseSSE: function(line) {
        try {
          var j = JSON.parse(line);
          if (j.type === 'content_block_delta' && j.delta && j.delta.text) return { content: j.delta.text };
          if (j.type === 'message_stop') return { done: true };
        } catch(e) {}
        return {};
      }
    },
    google: {
      name: 'Google',
      models: ['gemini-2.0-flash', 'gemini-1.5-pro', 'gemini-1.5-flash'],
      chatPath: function(model) { return '/v1beta/models/' + model + ':streamGenerateContent?alt=sse'; },
      buildRequest: function(model, msgs, settings) {
        var contents = msgs.filter(function(m) { return m.role !== 'system'; }).map(function(m) {
          return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
        });
        var req = { contents: contents, generationConfig: { temperature: settings.temperature, maxOutputTokens: settings.maxTokens } };
        var sysMsg = msgs.find(function(m) { return m.role === 'system'; });
        if (sysMsg) req.systemInstruction = { parts: [{ text: sysMsg.content }] };
        return req;
      },
      parseSSE: function(line) {
        try {
          var j = JSON.parse(line);
          if (j.candidates && j.candidates[0]) {
            var parts = j.candidates[0].content && j.candidates[0].content.parts;
            if (parts && parts[0] && parts[0].text) return { content: parts[0].text };
            if (j.candidates[0].finishReason) return { done: true };
          }
        } catch(e) {}
        return {};
      }
    }
  };

  async function loadServices() {
    try {
      var resp = await fetch('/routes');
      var routes = await resp.json();
      availableServices = Object.values(routes);
    } catch(e) { availableServices = []; }

    var select = document.getElementById('provider');
    select.innerHTML = '';
    var found = false;
    var savedKeys = loadApiKeys();
    Object.keys(PROVIDERS).forEach(function(key) {
      if (availableServices.indexOf(key) !== -1) {
        found = true;
        var opt = document.createElement('option');
        opt.value = key;
        opt.textContent = PROVIDERS[key].name + (savedKeys[key] ? '' : ' (no key)');
        select.appendChild(opt);
      }
    });
    if (!found) {
      Object.keys(PROVIDERS).forEach(function(key) {
        var o = document.createElement('option');
        o.value = key;
        o.textContent = PROVIDERS[key].name + ' (not configured)';
        select.appendChild(o);
      });
    }
    updateModels();
  }

  function updateModels() {
    var provider = document.getElementById('provider').value;
    var select = document.getElementById('model');
    select.innerHTML = '';
    if (provider && PROVIDERS[provider]) {
      PROVIDERS[provider].models.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        select.appendChild(opt);
      });
    }
  }
  document.getElementById('provider').addEventListener('change', updateModels);

  // ── Markdown rendering with highlight.js ──
  function renderMarkdown(text) {
    var html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Code blocks with language
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
      var langLabel = lang || 'text';
      var codeId = 'code-' + Math.random().toString(36).substr(2, 8);
      return '<pre><div class="code-header"><span>' + langLabel + '</span>' +
        '<button class="code-copy-btn" onclick="copyCode(\'' + codeId + '\', this)">Copy</button></div>' +
        '<code id="' + codeId + '" class="language-' + langLabel + '">' + code.trim() + '</code></pre>';
    });
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';
    html = html.replace(/<p>\s*<\/p>/g, '');
    html = html.replace(/<p>(<h[1-3]>)/g, '$1');
    html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
    html = html.replace(/<p>(<pre>)/g, '$1');
    html = html.replace(/(<\/pre>)<\/p>/g, '$1');
    html = html.replace(/<p>(<ul>)/g, '$1');
    html = html.replace(/(<\/ul>)<\/p>/g, '$1');
    return html;
  }

  function highlightAllCode() {
    document.querySelectorAll('.message-content pre code').forEach(function(block) {
      if (!block.dataset.highlighted) {
        hljs.highlightElement(block);
        block.dataset.highlighted = 'true';
      }
    });
  }

  window.copyCode = function(id, btn) {
    var el = document.getElementById(id);
    if (el) {
      navigator.clipboard.writeText(el.textContent);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }
  };

  function copyMessage(idx) {
    var conv = getActiveConv();
    if (conv && conv.messages[idx]) {
      navigator.clipboard.writeText(conv.messages[idx].content);
      var btn = document.querySelector('[data-copy-idx="' + idx + '"]');
      if (btn) {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }
    }
  }

  function renderMessages() {
    var container = document.getElementById('messages');
    var conv = getActiveConv();
    if (!conv || !conv.messages.length) {
      container.innerHTML = '<div class="welcome"><h2>AI Chat</h2><p>Select a provider and model, then start chatting.</p></div>';
      return;
    }
    container.innerHTML = '';
    conv.messages.forEach(function(msg, idx) {
      if (msg.role === 'system') return;
      var div = document.createElement('div');
      div.className = 'message ' + msg.role;
      var copyHtml = msg.role === 'assistant'
        ? '<button class="copy-btn" data-copy-idx="' + idx + '" onclick="copyMessageBtn(' + idx + ')">Copy</button>'
        : '';
      div.innerHTML = '<div class="message-header"><span class="message-role ' + msg.role + '">' + msg.role + '</span>' + copyHtml + '</div>' +
        '<div class="message-content">' + renderMarkdown(msg.content) + '</div>';
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
    highlightAllCode();
  }

  window.copyMessageBtn = function(idx) { copyMessage(idx); };

  function addMessageToUI(role, content, isStreaming) {
    var container = document.getElementById('messages');
    var welcome = container.querySelector('.welcome');
    if (welcome) welcome.remove();
    var div = document.createElement('div');
    div.className = 'message ' + role;
    var copyHtml = role === 'assistant'
      ? '<button class="copy-btn" data-copy-idx="pending">Copy</button>' : '';
    div.innerHTML = '<div class="message-header"><span class="message-role ' + role + '">' + role + '</span>' + copyHtml + '</div>' +
      '<div class="message-content">' + renderMarkdown(content) +
      (isStreaming ? '<span class="streaming-cursor"></span>' : '') + '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    if (!isStreaming) highlightAllCode();
    return div;
  }

  function updateStreamingMessage(el, content, done) {
    var contentEl = el.querySelector('.message-content');
    contentEl.innerHTML = renderMarkdown(content) + (done ? '' : '<span class="streaming-cursor"></span>');
    var container = document.getElementById('messages');
    container.scrollTop = container.scrollHeight;
    if (done) highlightAllCode();
  }

  function showError(msg) {
    var container = document.getElementById('messages');
    var div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = msg;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  // ── Settings UI ──
  window.toggleSettings = function(forceOpen) {
    var overlay = document.getElementById('settings-overlay');
    var isOpen = overlay.classList.contains('open');
    if (forceOpen === true || !isOpen) {
      var keys = loadApiKeys();
      var settings = loadSettings();
      ['openai', 'anthropic', 'google'].forEach(function(p) {
        document.getElementById('key-' + p).value = keys[p] || '';
        document.getElementById('key-' + p).type = 'password';
        var status = document.getElementById('status-' + p);
        if (keys[p]) { status.textContent = 'configured'; status.className = 'key-status set'; }
        else { status.textContent = 'not set'; status.className = 'key-status unset'; }
      });
      document.getElementById('temperature').value = settings.temperature || 0.7;
      document.getElementById('temp-val').textContent = settings.temperature || 0.7;
      document.getElementById('max-tokens').value = settings.maxTokens || 4096;
      document.getElementById('maxtok-val').textContent = settings.maxTokens || 4096;
      overlay.classList.add('open');
    } else {
      overlay.classList.remove('open');
    }
  };
  window.toggleKeyVis = function(provider) {
    var input = document.getElementById('key-' + provider);
    input.type = input.type === 'password' ? 'text' : 'password';
  };
  window.saveSettings = function() {
    var keys = {};
    ['openai', 'anthropic', 'google'].forEach(function(p) {
      var val = document.getElementById('key-' + p).value.trim();
      if (val) keys[p] = val;
    });
    saveApiKeysToStorage(keys);
    saveSettingsToStorage({
      temperature: parseFloat(document.getElementById('temperature').value),
      maxTokens: parseInt(document.getElementById('max-tokens').value)
    });
    document.getElementById('settings-overlay').classList.remove('open');
    // Update provider labels
    var select = document.getElementById('provider');
    Array.from(select.options).forEach(function(opt) {
      if (opt.value && PROVIDERS[opt.value]) {
        opt.textContent = PROVIDERS[opt.value].name + (keys[opt.value] ? '' : ' (no key)');
      }
    });
  };

  // Slider live update
  document.getElementById('temperature').addEventListener('input', function() {
    document.getElementById('temp-val').textContent = this.value;
  });
  document.getElementById('max-tokens').addEventListener('input', function() {
    document.getElementById('maxtok-val').textContent = this.value;
  });

  // ── System Prompt ──
  window.toggleSystemPrompt = function() {
    var toggle = document.getElementById('sp-toggle');
    var body = document.getElementById('sp-body');
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  };
  document.getElementById('system-prompt').addEventListener('change', function() {
    var conv = getActiveConv();
    if (conv) { conv.systemPrompt = this.value; saveConversations(); }
  });

  // ── Export ──
  window.exportMarkdown = function() {
    var conv = getActiveConv();
    if (!conv || !conv.messages.length) return;
    var md = '# ' + conv.title + '\n\n';
    if (conv.systemPrompt) md += '> System: ' + conv.systemPrompt + '\n\n';
    conv.messages.forEach(function(m) {
      if (m.role === 'system') return;
      md += '## ' + m.role.charAt(0).toUpperCase() + m.role.slice(1) + '\n\n' + m.content + '\n\n';
    });
    var blob = new Blob([md], { type: 'text/markdown' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = conv.title.replace(/[^a-z0-9]/gi, '_') + '.md';
    a.click();
  };

  // ── Send Message ──
  window.sendMessage = async function() {
    if (streaming) return;
    var input = document.getElementById('input');
    var text = input.value.trim();
    if (!text) return;

    var provider = document.getElementById('provider').value;
    var model = document.getElementById('model').value;
    if (!provider || !PROVIDERS[provider]) { showError('Please select a provider.'); return; }
    if (!model) { showError('Please select a model.'); return; }

    input.value = '';
    input.style.height = 'auto';

    var conv = getActiveConv();
    if (!conv) { newConversation(); conv = getActiveConv(); }

    // Build messages array with system prompt
    var sysPrompt = document.getElementById('system-prompt').value.trim();
    if (sysPrompt) conv.systemPrompt = sysPrompt;

    conv.messages.push({ role: 'user', content: text });

    // Update title from first user message
    if (conv.messages.filter(function(m) { return m.role === 'user'; }).length === 1) {
      conv.title = text.substring(0, 40) + (text.length > 40 ? '...' : '');
      renderConvList();
    }

    addMessageToUI('user', text, false);

    var prov = PROVIDERS[provider];
    var chatPath = typeof prov.chatPath === 'function' ? prov.chatPath(model) : prov.chatPath;
    var url = PROXY + '/' + provider + chatPath;

    var allMsgs = [];
    if (conv.systemPrompt) allMsgs.push({ role: 'system', content: conv.systemPrompt });
    conv.messages.forEach(function(m) { if (m.role !== 'system') allMsgs.push(m); });

    var settings = loadSettings();
    var modelSettings = { temperature: settings.temperature || 0.7, maxTokens: settings.maxTokens || 4096 };
    var body = prov.buildRequest(model, allMsgs, modelSettings);

    var headers = { 'Content-Type': 'application/json' };
    if (prov.extraHeaders) Object.keys(prov.extraHeaders).forEach(function(k) { headers[k] = prov.extraHeaders[k]; });

    var apiKeys = loadApiKeys();
    if (apiKeys[provider] && KEY_HEADERS[provider]) {
      var kh = KEY_HEADERS[provider];
      headers[kh.header] = kh.prefix + apiKeys[provider];
    }

    streaming = true;
    document.getElementById('send-btn').disabled = true;

    var assistantContent = '';
    var msgEl = addMessageToUI('assistant', '', true);

    try {
      var resp = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(body) });
      if (!resp.ok) {
        var errText = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + errText.substring(0, 200));
      }

      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      while (true) {
        var result = await reader.read();
        if (result.done) break;
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.startsWith(':')) continue;
          if (line.startsWith('data: ')) line = line.substring(6);
          if (!line) continue;
          var parsed = prov.parseSSE(line);
          if (parsed.done) break;
          if (parsed.content) {
            assistantContent += parsed.content;
            updateStreamingMessage(msgEl, assistantContent, false);
          }
        }
      }

      updateStreamingMessage(msgEl, assistantContent, true);
      conv.messages.push({ role: 'assistant', content: assistantContent });
      saveConversations();
    } catch(e) {
      updateStreamingMessage(msgEl, assistantContent || '(no response)', true);
      showError('Error: ' + e.message);
    }

    streaming = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  };

  // ── Input handling ──
  var textarea = document.getElementById('input');
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
  });
  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var overlay = document.getElementById('settings-overlay');
      if (overlay.classList.contains('open')) overlay.classList.remove('open');
    }
  });

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Init ──
  loadServices();
  loadConversations();

  var initialKeys = loadApiKeys();
  if (!initialKeys.openai && !initialKeys.anthropic && !initialKeys.google) {
    setTimeout(function() { toggleSettings(true); }, 500);
  }
})();
</script>
